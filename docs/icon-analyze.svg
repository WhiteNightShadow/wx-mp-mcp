<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="20" y1="10" x2="108" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10D87E"/>
      <stop offset="1" stop-color="#0E904B"/>
    </linearGradient>
    <linearGradient id="gloss" x1="64" y1="8" x2="64" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#tile)"/>
  <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#gloss)"/>
  <!-- terminal window: runnable node output -->
  <rect x="38" y="42" width="52" height="44" rx="9" fill="none" stroke="#ffffff" stroke-width="6"/>
  <!-- prompt chevron -->
  <path d="M50 60 l8 7 l-8 7" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cursor line -->
  <line x1="64" y1="74" x2="78" y2="74" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
</svg>
